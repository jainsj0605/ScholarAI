{% extends "base.html" %}
{% block title %}Q&A — Research AI{% endblock %}
{% block content %}

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
  <div>
    <h2 style="font-size:1.4rem;color:var(--accent-blue);margin-bottom:4px">💬 Paper Q&amp;A</h2>
    <p style="color:#666;font-size:.88rem">Ask questions and get answers grounded in the paper's text using RAG.</p>
  </div>
  <div id="paperTag"></div>
</div>

<div id="noPaper" class="card hidden">
  <p style="color:#888;font-size:.9rem">No paper loaded yet. <a href="/" style="color:var(--accent-blue)">Upload one first →</a></p>
</div>

<div id="mainContent">
  <!-- Query section -->
  <div class="card">
    <div style="display:flex;gap:10px">
      <input type="text" id="queryInput" placeholder="How does the methodology work?" 
             style="flex:1;background:#080a0f;border:1px solid #2a3347;border-radius:8px;padding:12px 18px;color:#e2e8f0;font-size:.9rem;outline:none"
             onkeydown="if(event.key==='Enter') runQA()"/>
      <button class="btn btn-primary" id="qaBtn" onclick="runQA()">Ask AI</button>
    </div>
  </div>

  <!-- Answer section -->
  <div class="card hidden" id="answerSection">
    <div class="card-title">🤖 AI Answer</div>
    <div id="answerOutput" class="md-out"></div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="clearQA()" style="font-size:.75rem">Clear</button>
    </div>
  </div>

  <!-- History -->
  <div class="card hidden" id="historySection">
    <div class="card-title">📜 History</div>
    <div id="historyList" style="display:flex;flex-direction:column;gap:12px"></div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
  const topic = SS.str("topic");
  if(!topic){
    document.getElementById("noPaper").classList.remove("hidden");
    document.getElementById("mainContent").classList.add("hidden");
  } else {
    document.getElementById("mainContent").classList.remove("hidden");
    document.getElementById("paperTag").innerHTML = `<span class="badge badge-info">${topic}</span>`;
  }

  const savedHistory = SS.get("qa_history") || [];
  if(savedHistory.length) showHistory();

  async function runQA(){
    const q = document.getElementById("queryInput").value.trim();
    if(!q) return;
    setBtn("qaBtn", true, "Searching...");
    try{
      const res  = await fetch("/qa", {method:"POST", headers:{"Content-Type":"application/json"}, 
        body:JSON.stringify({question: q})});
      const data = await res.json();
      if(data.error) throw new Error(data.error);

      document.getElementById("answerOutput").innerHTML = md(data.answer);
      document.getElementById("answerSection").classList.remove("hidden");
      
      // Save to history
      savedHistory.unshift({q, a: data.answer});
      if(savedHistory.length > 10) savedHistory.pop();
      SS.set("qa_history", savedHistory);
      showHistory();
      
      document.getElementById("queryInput").value = "";
    } catch(e){
      alert("Error: " + e.message);
    }
    setBtn("qaBtn", false, "Ask AI");
  }

  function showHistory(){
    const list = document.getElementById("historyList");
    list.innerHTML = savedHistory.map(h => `
      <div style="padding:14px;border:1px solid #1e2a40;border-radius:8px;background:#080a0f">
        <div style="color:var(--accent-blue);font-size:.78rem;font-weight:700;margin-bottom:6px">Q: ${h.q}</div>
        <div style="font-size:.85rem;color:#94a3b8">${md(h.a)}</div>
      </div>
    `).join('');
    document.getElementById("historySection").classList.remove("hidden");
  }

  function clearQA(){
    document.getElementById("answerSection").classList.add("hidden");
    SS.set("qa_history", []);
    savedHistory.length = 0;
    document.getElementById("historySection").classList.add("hidden");
  }
</script>
{% endblock %}
